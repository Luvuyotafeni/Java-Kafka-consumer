spring:
  application:
    name: springboot-payment-consumer

  kafka:
    bootstrap-servers: localhost:30092,localhost:30093,localhost:30094

    consumer:
      # ── Identity ──────────────────────────────────────────────────────────────
      # Consumer group ID — all instances sharing this ID form one group.
      # Kafka distributes partitions across the group; each partition is
      # consumed by exactly one member at a time.
      group-id: payment-initiated-consumer-group

      # ── Deserialisation ───────────────────────────────────────────────────────
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

      properties:
        # Tell the JsonDeserializer which class to deserialise the value into.
        spring.json.value.default.type: com.payments.consumer.model.PaymentInitiatedEvent

        # Trust the package so the deserializer doesn't reject the class.
        spring.json.trusted.packages: "com.payments.consumer.model,com.payments.events"


    listener:

      # Log the container lifecycle events — useful for debugging rebalances.
      log-container-config: true

topic:
  payment-initiated: payment-initiated
  payment-initiated-dlt: payment-initiated.dlt

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
